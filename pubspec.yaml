name: blood_donation
description: A Flutter application for blood donations.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=2.17.0 <4.0.0'

dependencies:
  cached_network_image: ^3.3.1
  cloud_firestore: ^5.6.6
  dots_indicator: ^2.0.0
  firebase_auth: ^5.5.3
  firebase_core: ^3.15.2
  firebase_storage: ^12.4.5
  flutter:
    sdk: flutter
  flutter_plugin_android_lifecycle: ^2.0.22
  flutter_svg: ^2.0.10+1
  fluttertoast: ^8.2.9
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  platform: ^3.1.5
  share_plus: ^10.1.4
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/

  fonts:
    - family: SF
      fonts:
        - asset: assets/fonts/sf.ttf
    - family: Courgette
      fonts:
        - asset: assets/fonts/courgette.ttf